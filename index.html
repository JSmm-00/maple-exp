<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>메이플 경험치 계산기</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<style>
    :root {
        --bg: #191f28;
        --surface: #202632;
        --surface-2: #2b323e;
        --line: #333b48;
        --text: #f9fafb;
        --text-2: #b0b8c1;
        --muted: #8b95a1;
        --blue: #3182f6;
        --lime: #d4ff00;
        --red: #f04452;

        /* ★ 캐릭터 칸 크기 (기본 96px) */
        --portrait: 96px;
        /* ★ 캐릭터 확대 배율: 키우려면 이 값을 올리세요 (1.6 ~ 2.6 권장) */
        --portrait-zoom: 2.3;
    }
    * { box-sizing: border-box; }
    html, body {
        margin: 0; padding: 0;
        background-color: var(--bg); color: var(--text);
        font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        letter-spacing: -0.3px;
        -webkit-font-smoothing: antialiased;
    }
    body { padding: 28px 16px 48px; }
    .hub { width: 100%; max-width: 680px; margin: 0 auto; }

    /* 헤더 */
    .hub-header { text-align: center; margin-bottom: 24px; }
    .hub-header h1 { margin: 0; font-size: 1.55em; font-weight: 800; color: var(--text); }
    .hub-header .accent { color: var(--lime); }
    .hub-header p { margin: 8px 0 0; font-size: 0.92em; color: var(--muted); font-weight: 500; }

    /* 카드 공통 */
    .card {
        background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 22px;
    }

    /* 닉네임 검색 */
    .search-card { margin-bottom: 24px; }
    .search-label { font-size: 0.95em; font-weight: 700; margin-bottom: 12px; color: var(--text); }
    .search-row { display: flex; gap: 8px; }
    .search-row input {
        flex: 1; box-sizing: border-box; padding: 14px 15px; border-radius: 11px;
        border: 1px solid var(--line); background: var(--bg); color: var(--text);
        font-size: 15px; font-family: inherit; letter-spacing: -0.3px;
    }
    .search-row input::placeholder { color: #6b7684; }
    .search-row input:focus { outline: none; border-color: var(--blue); }
    .search-row button {
        flex: 0 0 auto; padding: 0 24px; border: none; border-radius: 11px;
        background: var(--blue); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
        font-family: inherit; letter-spacing: -0.3px; transition: background-color 0.15s;
    }
    .search-row button:hover { background: #1f6fe8; }
    .search-row button:active { transform: translateY(1px); }

    /* 검색 결과 */
    .char-result { margin-top: 18px; }
    .char-result .placeholder { color: #6b7684; font-size: 0.9em; text-align: center; padding: 12px 0; }
    .char-result .err { color: var(--red); font-weight: 700; font-size: 0.9em; text-align: center; padding: 12px 0; }

    .ci-card {
        display: flex; gap: 16px; align-items: stretch;
        background: linear-gradient(135deg, #232b38 0%, #1c222d 100%);
        border: 1px solid var(--line); border-radius: 14px; padding: 16px;
    }
    .ci-portrait {
        position: relative; flex: 0 0 var(--portrait); width: var(--portrait); min-height: var(--portrait);
        border-radius: 12px; background: radial-gradient(circle at 50% 62%, rgba(212,255,0,0.14) 0%, rgba(49,130,246,0.10) 45%, transparent 72%), #12161d;
        border: 1px solid #2b323e; display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
    }
    .ci-portrait img {
        width: var(--portrait); height: var(--portrait); object-fit: contain;
        transform: scale(var(--portrait-zoom)); transform-origin: 50% 62%;
        image-rendering: pixelated;
    }
    .ci-portrait.empty::after { content: '?'; color: #3a4453; font-size: 2em; font-weight: 800; padding-bottom: 26px; }

    .ci-body { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .ci-head { display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; }
    .ci-name { font-size: 1.32em; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
    .ci-lv { font-size: 0.95em; font-weight: 800; color: var(--lime); white-space: nowrap; }
    .ci-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
    .ci-badge {
        font-size: 0.76em; font-weight: 600; color: var(--text-2);
        background: #2b323e; border: 1px solid #39414f; border-radius: 999px; padding: 3px 10px; white-space: nowrap;
    }
    .ci-badge.guild { color: #9fd0ff; background: rgba(49,130,246,0.14); border-color: rgba(49,130,246,0.4); }

    .ci-exp { margin-top: 16px; }
    .ci-exp-top { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.86em; margin-bottom: 7px; }
    .ci-exp-top .lbl { color: var(--muted); font-weight: 500; }
    .ci-exp-top .val { color: var(--lime); font-weight: 800; font-size: 1.12em; }
    .ci-bar { position: relative; width: 100%; height: 14px; background: #10141b; border: 1px solid #262d38; border-radius: 999px; overflow: hidden; }
    .ci-bar-fill {
        height: 100%; width: 0; border-radius: 999px;
        background: linear-gradient(90deg, #8fbf1f 0%, #c4f000 55%, var(--lime) 100%);
        box-shadow: 0 0 10px rgba(212,255,0,0.35);
        transition: width 0.6s cubic-bezier(.2,.8,.2,1);
    }
    .ci-bar-fill::after {
        content: ''; position: absolute; inset: 0 0 auto 0; height: 50%;
        background: linear-gradient(180deg, rgba(255,255,255,0.22), transparent); border-radius: 999px 999px 0 0;
    }
    .ci-date { margin-top: 11px; font-size: 0.78em; color: #6b7684; text-align: right; }

    @media (max-width: 420px) {
        .ci-card { gap: 12px; padding: 14px; }
        .ci-card { --portrait: 76px; }
        .ci-name { font-size: 1.15em; }
    }

    /* 계산기 목록 */
    .menu-title { font-size: 1.02em; font-weight: 700; margin: 0 0 14px 2px; color: var(--text); }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .cat-card {
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
        background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
        padding: 24px 12px; min-height: 126px; text-align: center; text-decoration: none;
        color: var(--text); cursor: pointer;
        transition: border-color 0.15s, box-shadow 0.15s, background-color 0.15s, transform 0.05s;
    }
    .cat-card:hover {
        border-color: var(--blue); background: var(--surface-2);
        box-shadow: 0 4px 16px rgba(49, 130, 246, 0.18);
    }
    .cat-card:active { transform: translateY(1px); }
    .cat-icon {
        width: 46px; height: 46px; border-radius: 12px; background: var(--surface-2);
        display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .cat-icon img { width: 46px; height: 46px; object-fit: cover; }
    .cat-name { font-size: 0.92em; font-weight: 700; line-height: 1.35; word-break: keep-all; color: var(--text); }

    .hub-foot { margin-top: 24px; text-align: center; font-size: 0.78em; color: #6b7684; }

    @media (max-width: 560px) {
        .grid { grid-template-columns: repeat(2, 1fr); }
        .card { padding: 18px; }
    }
</style>
</head>
<body>
<div class="hub">
    <div class="hub-header">
        <h1>메이플 <span class="accent">경험치</span> 계산기</h1>
        <p>닉네임 검색 · 콘텐츠별 경험치 계산</p>
    </div>

    <!-- 닉네임 검색 (캐릭터 및 경험치) -->
    <div class="card search-card">
        <div class="search-label">닉네임 검색</div>
        <div class="search-row">
            <input id="charName" type="text" placeholder="캐릭터 닉네임을 입력하세요" />
            <button type="button" onclick="fetchCharacter()">검색</button>
        </div>
        <div id="charResult" class="char-result">
            <div class="placeholder">닉네임을 검색하면 캐릭터 정보와 현재 경험치가 표시됩니다.</div>
        </div>
    </div>

    <!-- 계산기 목록 -->
    <div class="menu">
        <h2 class="menu-title">계산기 선택</h2>
        <div class="grid">
            <!-- href="#" 자리에 각 계산기 페이지 주소를 넣으세요 -->
            <a class="cat-card" href="mvp-vip.html">
                <span class="cat-icon"><img src="" alt="" onerror="this.style.display='none'"></span>
                <span class="cat-name">MVP리조트 &amp;<br>VIP 사우나</span>
            </a>
            <a class="cat-card" href="exp-coupon.html">
                <span class="cat-icon"><img src="" alt="" onerror="this.style.display='none'"></span>
                <span class="cat-name">EXP 교환권</span>
            </a>
            <a class="cat-card" href="growth-potion.html">
                <span class="cat-icon"><img src="" alt="" onerror="this.style.display='none'"></span>
                <span class="cat-name">성장의 비약</span>
            </a>
            <a class="cat-card" href="strawberry.html">
                <span class="cat-icon"><img src="" alt="" onerror="this.style.display='none'"></span>
                <span class="cat-name">딸기농장</span>
            </a>
            <a class="cat-card" href="monster-park.html">
                <span class="cat-icon"><img src="" alt="" onerror="this.style.display='none'"></span>
                <span class="cat-name">몬스터 파크</span>
            </a>
            <a class="cat-card" href="epic-dungeon.html">
                <span class="cat-icon"><img src="" alt="" onerror="this.style.display='none'"></span>
                <span class="cat-name">에픽던전</span>
            </a>
        </div>
    </div>

    <div class="hub-foot">※ 캐릭터 정보는 넥슨 오픈 API 기준(보통 전일 데이터)입니다.</div>
</div>

<script src="config.js"></script>
<script>
    // 프록시 주소는 config.js 에서 한 번만 설정합니다.
    const MAPLE_PROXY_URL = (window.MAPLE_PROXY_URL || "").trim();

    // 닉네임 등 문자열을 HTML에 안전하게 넣기
    function esc(s) {
        return String(s).replace(/[&<>"']/g, function (m) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
        });
    }

    async function fetchCharacter() {
        const nameEl = document.getElementById('charName');
        const box = document.getElementById('charResult');
        const name = (nameEl.value || '').trim();

        if (!name) { box.innerHTML = '<div class="err">캐릭터 닉네임을 입력하세요.</div>'; return; }
        if (!MAPLE_PROXY_URL) { box.innerHTML = '<div class="err">config.js 에 Worker 주소를 먼저 입력하세요.</div>'; return; }

        box.innerHTML = '<div class="placeholder">조회 중...</div>';
        try {
            const res = await fetch(MAPLE_PROXY_URL.replace(/\/$/, '') + '/?name=' + encodeURIComponent(name));
            const data = await res.json();
            if (!res.ok || data.error) {
                box.innerHTML = '<div class="err">' + (data.error || '조회에 실패했습니다.') + '</div>';
                return;
            }
            const rate = parseFloat(data.character_exp_rate);
            const rateStr = isNaN(rate) ? '-' : rate.toFixed(3);
            const width = isNaN(rate) ? 0 : Math.min(rate, 100);
            const baseDate = data.date ? String(data.date).slice(0, 10) : '';

            // 캐릭터 외형 이미지 (Worker 미갱신 시 없을 수 있음 → 자동으로 숨김)
            let imgTag = '<span class="ci-portrait empty"></span>';
            if (data.character_image) {
                // 넥슨의 width/height는 '캔버스 크기'라 키우면 여백만 늘어남.
                // 캐릭터에 가깝게 좁은 캔버스를 요청하고, 확대는 CSS(--portrait-zoom)로 처리한다.
                const sep = data.character_image.includes('?') ? '&' : '?';
                const imgUrl = data.character_image + sep + 'width=96&height=96&x=48&y=48';
                imgTag = '<span class="ci-portrait"><img src="' + imgUrl + '" alt="" ' +
                         'onerror="this.parentNode.classList.add(\'empty\'); this.remove();"></span>';
            }

            const badges = [];
            if (data.world_name) badges.push('<span class="ci-badge">' + esc(data.world_name) + '</span>');
            if (data.character_class) badges.push('<span class="ci-badge">' + esc(data.character_class) + '</span>');
            if (data.character_guild_name) badges.push('<span class="ci-badge guild">' + esc(data.character_guild_name) + '</span>');

            box.innerHTML =
                '<div class="ci-card">' +
                    imgTag +
                    '<div class="ci-body">' +
                        '<div class="ci-head">' +
                            '<span class="ci-name">' + esc(data.character_name || name) + '</span>' +
                            '<span class="ci-lv">Lv.' + data.character_level + '</span>' +
                        '</div>' +
                        (badges.length ? '<div class="ci-badges">' + badges.join('') + '</div>' : '') +
                        '<div class="ci-exp">' +
                            '<div class="ci-exp-top"><span class="lbl">현재 경험치</span><span class="val">' + rateStr + '%</span></div>' +
                            '<div class="ci-bar"><div class="ci-bar-fill" style="width:' + width + '%"></div></div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
                (baseDate ? '<div class="ci-date">기준일 ' + baseDate + '</div>' : '');
        } catch (e) {
            box.innerHTML = '<div class="err">조회 중 오류가 발생했습니다. (주소/네트워크 확인)</div>';
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const input = document.getElementById('charName');
        if (input) input.addEventListener('keyup', function(e) { if (e.key === 'Enter') fetchCharacter(); });
    });
</script>
</body>
</html>
